name: answer-service

x-app: &app
  build:
    context: .
    dockerfile: deploy/prod/answer_service/Dockerfile
  image: answer-service:local
  env_file: [.env.dev]
  environment:
    POSTGRES_HOST: postgres
    NATS_HOST: nats
    REDIS_HOST: redis
    QDRANT_HOST: qdrant
    SOURCE_STORAGE_DIRECTORY: /app/var/uploads
  volumes:
    - uploads:/app/var/uploads
  restart: unless-stopped

x-backing-services: &backing-services
  postgres: {condition: service_healthy}
  nats: {condition: service_healthy}
  redis: {condition: service_healthy}
  qdrant: {condition: service_started}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-answer_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-answer_service}
      POSTGRES_DB: ${POSTGRES_DB:-answer_service}
      # Applies to the initial cluster only; pg_hba.conf governs afterwards.
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/prod/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./deploy/prod/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-answer_service}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats:
    # JetStream and the credentials both come from nats.conf, which the server
    # expands $NATS_USER / $NATS_PASSWORD into at startup.
    image: nats:2.12-alpine
    command: ["--config", "/etc/nats/nats.conf"]
    environment:
      NATS_USER: ${NATS_USER:-answer_service}
      NATS_PASSWORD: ${NATS_PASSWORD:?NATS_PASSWORD must be set}
    ports: ["4222:4222", "8222:8222"]
    volumes:
      - nats-data:/data
      - ./deploy/prod/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    entrypoint: ["/usr/local/bin/redis_entrypoint.sh"]
    environment:
      REDIS_DEFAULT_PASSWORD: ${REDIS_DEFAULT_PASSWORD:?REDIS_DEFAULT_PASSWORD must be set}
      REDIS_USER: ${REDIS_USER:-answer_service}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
      - ./deploy/prod/redis/redis_entrypoint.sh:/usr/local/bin/redis_entrypoint.sh:ro
    healthcheck:
      # Authenticates as `default`: with an ACL in place a bare PING is denied,
      # so an unauthenticated probe would report the server as unhealthy.
      test:
        - CMD-SHELL
        - redis-cli --no-auth-warning -a "$$REDIS_DEFAULT_PASSWORD" ping | grep -q PONG
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    # Self-hosted Qdrant has no key of its own: whatever you put in
    # QDRANT_API_KEY becomes the key, here on the server and in the client.
    # Without it every collection is readable and writable by anyone who can
    # reach the port.
    image: qdrant/qdrant:v1.16.1
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY must be set}
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant-data:/qdrant/storage]
    healthcheck:
      test: ["CMD", "sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  migrations:
    <<: *app
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres: {condition: service_healthy}
    restart: on-failure

  api:
    <<: *app
    ports: ["8080:8080"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://localhost:8080/healthcheck/", timeout=5)
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      <<: *backing-services
      migrations: {condition: service_completed_successfully}

  worker:
    <<: *app
    command:
      - taskiq
      - worker
      - answer_service.worker_app:create_worker_taskiq_app
    depends_on:
      <<: *backing-services
      migrations: {condition: service_completed_successfully}

  scheduler:
    <<: *app
    command:
      - taskiq
      - scheduler
      - answer_service.scheduler_app:create_scheduler_taskiq_app
    depends_on:
      <<: *backing-services
      migrations: {condition: service_completed_successfully}

volumes:
  postgres-data:
  nats-data:
  redis-data:
  qdrant-data:
  uploads:
