[pytest]
xfail_strict = true
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts =
    --mypy
    --strict-markers
    -m "not quality"
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    quality: Search quality against a live deployment (deselected by default)
