name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # `just` recipes call `uv run --active`, which needs the synced venv active.
  VIRTUAL_ENV: ${{ github.workspace }}/.venv
  UV_FROZEN: "1"
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint (ruff + codespell + typos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just
      - run: uv sync --frozen --group dev
      # `just ruff-format` rewrites files; CI must fail on drift instead.
      - name: Ruff format (check only)
        run: uv run --active --frozen ruff format --check --diff
      - name: Ruff check
        run: uv run --active --frozen ruff check --output-format=github
      - name: Codespell
        run: just _codespell
      - name: Typos
        run: just typos

  types:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just
      - run: uv sync --frozen --group dev
      - run: just mypy

  architecture:
    name: Layering (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just
      - run: uv sync --frozen --group dev
      - run: just import-linter

  security:
    name: Security (bandit + semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just
      - run: uv sync --frozen --group dev
      - run: just bandit
      - run: just semgrep

  test:
    name: Tests (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0 # hatch-vcs derives the version from tags
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just
      - run: uv sync --frozen --group dev
      # Pulled up front with retries so a Docker Hub rate-limit is not reported
      # as a testcontainers failure.
      - name: Pre-pull Postgres image
        run: |
          for attempt in 1 2 3 4 5; do
            docker pull postgres:17-alpine && exit 0
            echo "docker pull failed (attempt ${attempt}); retrying in 15s" >&2
            sleep 15
          done
          echo "could not pull postgres:17-alpine after 5 attempts" >&2
          exit 1
      - name: Run tests with coverage
        run: just test-ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage.xml
            junit.xml
          if-no-files-found: ignore

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: gitleaks (filesystem scan)
        run: >-
          docker run --rm -v "${{ github.workspace }}:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1 dir /repo --redact --exit-code 1
