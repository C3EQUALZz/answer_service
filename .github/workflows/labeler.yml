name: Labeler

on:
  pull_request_target:

permissions:
  contents: read

jobs:
  label:
    name: Label PR by path
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # No checkout: pull_request_target must never run pull-request code.
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
