name: Labeler

on:
  pull_request_target:

permissions:
  contents: read

jobs:
  label:
    name: Label PR by path
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # No checkout: pull_request_target must never run pull-request code.
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
