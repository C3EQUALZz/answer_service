name: SonarQube

on:
  push:
    branches: [master]
  pull_request:

# Organization and project key live in sonar-project.properties.
#
# The token lives in the `SONAR_TOKEN` environment, which is why this job
# declares one. Nothing gates the job itself: a job-level `if` is evaluated
# before the environment is resolved, so an environment variable read there is
# always empty — which is exactly how this workflow spent 19 runs silently
# skipping while appearing to be configured.
permissions:
  contents: read

env:
  VIRTUAL_ENV: ${{ github.workspace }}/.venv

jobs:
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    environment: SONAR_TOKEN
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Sonar attributes issues to the introducing commit
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just
      - run: uv sync --frozen --group dev
      - name: Pre-pull Postgres image
        run: |
          for attempt in 1 2 3 4 5; do
            docker pull postgres:17-alpine && exit 0
            echo "docker pull failed (attempt ${attempt}); retrying in 15s" >&2
            sleep 15
          done
          echo "could not pull postgres:17-alpine after 5 attempts" >&2
          exit 1
      - name: Generate coverage (xml)
        run: just test-ci
      # Guarded at step level, where secrets *are* readable: a fork or
      # dependabot pull request has no access to the token, and should skip the
      # upload rather than fail on an empty one.
      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
