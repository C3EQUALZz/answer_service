name: SonarQube

on:
  push:
    branches: [master]
  pull_request:

# Organization and project key live in sonar-project.properties. Gated on the
# ENABLE_SONAR variable because a secret cannot be referenced in a job `if`.
permissions:
  contents: read

env:
  VIRTUAL_ENV: ${{ github.workspace }}/.venv

jobs:
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SONAR == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Sonar attributes issues to the introducing commit
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just
      - run: uv sync --frozen --group dev
      - name: Pre-pull Postgres image
        run: |
          for attempt in 1 2 3 4 5; do
            docker pull postgres:17-alpine && exit 0
            echo "docker pull failed (attempt ${attempt}); retrying in 15s" >&2
            sleep 15
          done
          echo "could not pull postgres:17-alpine after 5 attempts" >&2
          exit 1
      - name: Generate coverage (xml)
        run: just test-ci
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
