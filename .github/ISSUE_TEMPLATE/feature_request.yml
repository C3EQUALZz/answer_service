name: Feature request
description: Propose a capability or a change in behaviour
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can you not do today, and what does that cost you?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should happen instead?
    validations:
      required: true

  - type: dropdown
    id: context
    attributes:
      label: Which bounded context does this belong to?
      description: See AGENTS.md. Pick "Not sure" rather than guessing.
      options:
        - Indexing (catalog and synchronization)
        - Search (retrieval and rank fusion)
        - Analytics (query logs and reporting)
        - Conversation (RAG answers) — planned
        - Cross-cutting (config, deployment, tooling)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
