# nats-server expands $VAR from the environment; unset variables abort startup.

port: 4222
http_port: 8222

server_name: answer_service_nats

jetstream {
  store_dir: /data
  max_memory_store: 256MB
  max_file_store: 4GB
}

# Without this block nats-server accepts every connection unauthenticated.
authorization {
  # Must cover TASKIQ_SUBJECT and TASKIQ_STREAM_NAME.
  ANSWER_SERVICE_PERMISSIONS = {
    publish = {
      allow = [
        "answer_service.>"
        "$JS.API.>"
        # Consumers ack here; without it JetStream redelivers forever.
        "$JS.ACK.>"
        "_INBOX.>"
      ]
    }
    subscribe = {
      allow = [
        "answer_service.>"
        "_INBOX.>"
      ]
    }
  }

  users = [
    {
      user: $NATS_USER
      password: $NATS_PASSWORD
      permissions: $ANSWER_SERVICE_PERMISSIONS
    }
  ]
}

# 8222 is unauthenticated by design; do not publish it outside the host.
