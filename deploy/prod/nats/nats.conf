# nats-server expands $VAR from the environment, so this file needs no
# templating step. Every referenced variable must be set or the server refuses
# to start.

port: 4222
http_port: 8222

server_name: answer_service_nats

jetstream {
  store_dir: /data
  max_memory_store: 256MB
  max_file_store: 4GB
}

# No anonymous access: without an authorization block nats-server accepts every
# connection, which is how a broker ends up reachable from anywhere on the
# network with no credential at all.
authorization {
  # The subjects must cover TASKIQ_SUBJECT and TASKIQ_STREAM_NAME. They default
  # to answer_service.tasks and answer_service_jetstream; change both together.
  ANSWER_SERVICE_PERMISSIONS = {
    publish = {
      allow = [
        "answer_service.>"
        "$JS.API.>"
        "_INBOX.>"
      ]
    }
    subscribe = {
      allow = [
        "answer_service.>"
        "_INBOX.>"
      ]
    }
  }

  users = [
    {
      user: $NATS_USER
      password: $NATS_PASSWORD
      permissions: $ANSWER_SERVICE_PERMISSIONS
    }
  ]
}

# The monitoring endpoint on 8222 is unauthenticated by design and is what the
# container healthcheck calls. Do not publish that port outside the host.
