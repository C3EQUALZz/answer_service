# Client authentication. Evaluated top to bottom; the FIRST matching line wins,
# and a non-matching connection is rejected outright.
#
# TYPE  DATABASE  USER  ADDRESS       METHOD

# Unix socket, inside the container only. Used by pg_isready and by psql when
# you exec into the container.
local   all       all                 scram-sha-256

# Loopback inside the container.
host    all       all   127.0.0.1/32  scram-sha-256
host    all       all   ::1/128       scram-sha-256

# The compose network. RFC1918 rather than 0.0.0.0/0: the container's address is
# assigned by Docker and is not known ahead of time, but it is always private.
# Narrow this to the real subnet when you pin one.
host    all       all   10.0.0.0/8    scram-sha-256
host    all       all   172.16.0.0/12 scram-sha-256
host    all       all   192.168.0.0/16 scram-sha-256

# Everything else. Explicit, so a misconfigured network cannot fall through to a
# permissive default.
host    all       all   0.0.0.0/0     reject
host    all       all   ::/0          reject
