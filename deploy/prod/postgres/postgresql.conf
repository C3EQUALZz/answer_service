# Only the settings this service actually depends on. Everything else stays at
# the server default, so an upgrade picks up new defaults instead of inheriting
# a stale copy of an old stock file.

# --- Connections ------------------------------------------------------------
listen_addresses = '*'          # pg_hba.conf, not the socket, restricts access
port = 5432
max_connections = 100

# --- Authentication ---------------------------------------------------------
# scram-sha-256, never md5: md5 is forgeable from a stolen hash.
password_encryption = scram-sha-256

# --- Resources --------------------------------------------------------------
shared_buffers = 512MB
temp_buffers = 32MB
work_mem = 4MB
maintenance_work_mem = 128MB
dynamic_shared_memory_type = posix

# --- Durability -------------------------------------------------------------
# synchronous_commit stays ON. The outbox is the reason: a relayed event is only
# safe to publish because the row describing it was committed in the same
# transaction as the state change. Async commit can lose the last few
# transactions on a crash, which turns at-least-once delivery into
# at-most-once for exactly the events nobody noticed were missing.
synchronous_commit = on
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 256MB

# --- Logging ----------------------------------------------------------------
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d '
log_hostname = off              # a DNS lookup per connection, for little gain
log_timezone = 'Etc/UTC'
log_min_duration_statement = 500ms
log_lock_waits = on
# The relay takes FOR UPDATE SKIP LOCKED; a statement blocking this long means
# a transaction is being held open somewhere it should not be.
log_checkpoints = on

# --- Locale -----------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Etc/UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
