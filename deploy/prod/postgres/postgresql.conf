# Only the settings this service depends on; the rest stays at server default.

# --- Connections ------------------------------------------------------------
listen_addresses = '*'          # pg_hba.conf restricts access, not this
port = 5432
max_connections = 100

# --- Authentication ---------------------------------------------------------
# Never md5: it is forgeable from a stolen hash.
password_encryption = scram-sha-256

# --- Resources --------------------------------------------------------------
shared_buffers = 512MB
temp_buffers = 32MB
work_mem = 4MB
maintenance_work_mem = 128MB
dynamic_shared_memory_type = posix

# --- Durability -------------------------------------------------------------
# Stays on for the outbox: async commit can lose committed events on a crash,
# turning at-least-once delivery into at-most-once.
synchronous_commit = on
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 256MB

# --- Logging ----------------------------------------------------------------
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d '
log_hostname = off
log_timezone = 'Etc/UTC'
log_min_duration_statement = 500ms
log_lock_waits = on
log_checkpoints = on

# --- Locale -----------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Etc/UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
