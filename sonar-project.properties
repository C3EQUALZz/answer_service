sonar.projectKey=C3EQUALZz_answer_service
sonar.organization=c3equalz

sonar.projectName=answer_service
sonar.links.homepage=https://github.com/C3EQUALZz/answer_service
sonar.links.scm=https://github.com/C3EQUALZz/answer_service
sonar.links.issue=https://github.com/C3EQUALZz/answer_service/issues

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit.xml

sonar.exclusions=\
  src/answer_service/_version.py,\
  src/answer_service/infrastructure/persistence/migrations/**

# Must match .coveragerc, or Sonar reports the entry points as uncovered.
sonar.coverage.exclusions=\
  src/answer_service/fastapi_app.py,\
  src/answer_service/worker_app.py,\
  src/answer_service/scheduler_app.py,\
  src/answer_service/_version.py,\
  src/answer_service/infrastructure/persistence/migrations/**

# Rules suppressed deliberately, each with the reason it cannot apply here.
# Ant-style globs only: Sonar does not expand {a,b} braces, so every path is
# listed on its own criterion.
sonar.issue.ignore.multicriteria=fakecreds,localhttp,asyncworker,asynchandler,asynctasks

# S2068 flags any assignment to something named "password". Every hit is a
# fixture credential for a config loader whose field is literally called
# `password` — the name is what is under test and cannot be renamed away.
sonar.issue.ignore.multicriteria.fakecreds.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.fakecreds.resourceKey=tests/**/*.py

# S5332 flags plain HTTP. The only hit is httpx's in-process ASGI transport,
# whose base_url never leaves the test process and reaches no network.
sonar.issue.ignore.multicriteria.localhttp.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.localhttp.resourceKey=tests/**/*.py

# S7503 flags `async` without `await`. These callbacks are awaited by taskiq and
# FastAPI, which require a coroutine — dropping `async` would break the contract
# rather than tidy it. The one case that was genuinely gratuitous,
# `get_sessionmaker`, is now a plain function instead of being excluded here.
sonar.issue.ignore.multicriteria.asyncworker.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.asyncworker.resourceKey=src/answer_service/worker_app.py

sonar.issue.ignore.multicriteria.asynchandler.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.asynchandler.resourceKey=src/answer_service/presentation/http/v1/common/exception_handler.py

sonar.issue.ignore.multicriteria.asynctasks.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.asynctasks.resourceKey=tests/integration/infrastructure/test_task_iq_scheduler.py
