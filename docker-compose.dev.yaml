name: answer-service-dev

# Backing services only — Postgres, NATS, Redis and Qdrant — for running the
# app itself on the host (uvicorn / taskiq worker) against real dependencies.
#
#   docker compose -f docker-compose.dev.yaml up -d
#   uv run alembic upgrade head
#   uv run uvicorn answer_service.fastapi_app:create_fastapi_app --factory --reload
#
# Every credential defaults to a throwaway dev value, so it comes up with no
# .env. Point the app at localhost on the published ports below.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-answer_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-answer_service}
      POSTGRES_DB: ${POSTGRES_DB:-answer_service}
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-answer_service}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats:
    # nats.conf expands $NATS_USER / $NATS_PASSWORD at startup.
    image: nats:2.12-alpine
    command: ["--config", "/etc/nats/nats.conf"]
    environment:
      NATS_USER: ${NATS_USER:-answer_service}
      NATS_PASSWORD: ${NATS_PASSWORD:-answer_service}
    ports: ["4222:4222", "8222:8222"]
    volumes:
      - nats-data:/data
      - ./deploy/prod/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    entrypoint: ["/usr/local/bin/redis_entrypoint.sh"]
    environment:
      REDIS_DEFAULT_PASSWORD: ${REDIS_DEFAULT_PASSWORD:-answer_service}
      REDIS_USER: ${REDIS_USER:-answer_service}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-answer_service}
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
      - ./deploy/prod/redis/redis_entrypoint.sh:/usr/local/bin/redis_entrypoint.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli --no-auth-warning -a "$$REDIS_DEFAULT_PASSWORD" ping | grep -q PONG
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.3
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-answer_service}
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant-data:/qdrant/storage]
    healthcheck:
      # No curl/wget/nc in the image; bash /dev/tcp is the only HTTP client.
      test:
        - CMD
        - bash
        - -c
        - >-
          exec 3<>/dev/tcp/127.0.0.1/6333 &&
          printf 'GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          grep -q '200 OK' <&3
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres-data:
  nats-data:
  redis-data:
  qdrant-data:
